<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
    <defs>
        <linearGradient id="thread" x1="30" y1="30" x2="98" y2="98" gradientUnits="userSpaceOnUse">
            <stop offset="0" stop-color="#4FC3C3" />
            <stop offset="1" stop-color="#E39A45" />
        </linearGradient>
    </defs>
    <!-- Midnight ground: the dark room the log is kept in -->
    <rect width="128" height="128" fill="#080B0E" />
    <!-- The "N", lit like the avatar: teal stem (left), amber stem (right),
         joined by the teal->amber gradient diagonal — one thread between the two lights. -->
    <polygon points="30,30 46,30 98,98 82,98" fill="url(#thread)" />
    <rect x="30" y="30" width="16" height="68" fill="#4FC3C3" />
    <rect x="82" y="30" width="16" height="68" fill="#E39A45" />
</svg>
