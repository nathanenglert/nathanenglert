[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

[[redirects]]
  from = "/apps/raffler"
  to = "https://nathanenglert.github.io/raffler"
  status = 301
  force = true

[[redirects]]
  from = "/apps/raffler/*"
  to = "https://nathanenglert.github.io/raffler/:splat"
  status = 301
  force = true
